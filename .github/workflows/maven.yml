name: Java CI

on:
  push:
    branches:
      - main
      - feature-*
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Start MySQL
        run: |
          docker run -d \
            --name mysql \
            -e MYSQL_ROOT_PASSWORD=root \
            -e MYSQL_DATABASE=bootdo \
            -p 3306:3306 \
            mysql:5.7 \
            --lower_case_table_names=1

      - name: Check MySQL
        run: |
          sleep 25
          mysql -h 127.0.0.1 -uroot -proot -e "SHOW VARIABLES LIKE 'lower_case_table_names';"
          mysql -h 127.0.0.1 -uroot -proot -e "SHOW DATABASES;"

      - name: Set MySQL sql_mode
        run: |
          mysql -h 127.0.0.1 -uroot -proot -e "SET GLOBAL sql_mode='';"

      - name: Import SQL
        run: |
          mysql -h 127.0.0.1 -uroot -proot bootdo < bootdo.sql

      - name: Update database password for CI
        run: |
          sed -i 's/password:.*/password: root/' src/main/resources/application-dev.yml

      - name: Disable MySQL SSL for CI
        run: |
          sed -i 's/characterEncoding=utf8/characterEncoding=utf8\&useSSL=false/' src/main/resources/application-dev.yml
      - name: Code check with Checkstyle
        run: |
          mvn checkstyle:checkstyle
      

      - name: Upload build artifact

        uses: actions/upload-artifact@v4

        with:

          name: bootdo-package

          path: target/*.jar

      - name: Build with Maven
        run: |
          mvn clean package -DskipTests
      


      - name: Run project
        run: |
          timeout 60s mvn spring-boot:run -Dspring-boot.run.arguments="--server.port=8080,--spring.activiti.database-schema-update=false" || true